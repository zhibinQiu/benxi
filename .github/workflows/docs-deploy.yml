name: 部署 MkDocs 文档站点
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: |
          pip install -r docs/requirements-docs.txt
      - name: 部署文档站点
        run: mkdocs gh-deploy --force
