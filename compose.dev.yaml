# 开发覆盖（stack.sh dev-up / dev.sh docker 时自动叠加）
#
# 作用:
#   - api: 挂载 platform/app、uvicorn --reload、映射 127.0.0.1:18000
#   - worker: 挂载源码
#   - frontend: Node + Vite HMR（替代生产 Nginx 镜像）
#
# 浏览器: http://127.0.0.1:40005/ai/（SPA）
#         http://127.0.0.1:18000（API）

services:
  api:
    image: zhitan-api-runtime:${ZHITAN_VERSION:-4.2.1}
    build:
      context: .
      dockerfile: platform/Dockerfile
      target: runtime
      args:
        INSTALL_PAGEINDEX: ${INSTALL_PAGEINDEX:-1}
        INSTALL_BROWSER: ${INSTALL_BROWSER:-1}
    shm_size: "512mb"
    ports:
      # 开发时浏览器直连 API（8000 常被本机其它进程占用，默认用 18000）
      - "127.0.0.1:${STACK_DEV_API_PORT:-18000}:8000"
    volumes:
      - ./platform/app:/app/app:ro
      - ./platform/workers:/app/workers:ro
      - ./docs:/app/system-docs/docs:ro
      - ./运维部署指南.md:/app/system-docs/运维部署指南.md:ro
      - ./RELEASE.md:/app/system-docs/RELEASE.md:ro
      - ${DATA_ROOT:-./data}/pageindex:/app/.run/pageindex
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      SYSTEM_DOCS_ROOT: /app/system-docs
      # 开发栈优先使用宿主机 speech-api（./dev.sh speech local），避免容器内重复下载/损坏模型
      SPEECH_SERVICE_URL: http://host.docker.internal:8765
      RAGFLOW_MYSQL_HOST: knowflow-mysql

  worker:
    image: zhitan-api-runtime:${ZHITAN_VERSION:-4.2.1}
    shm_size: "512mb"
    volumes:
      - ./platform/app:/app/app:ro
      - ./platform/workers:/app/workers:ro
      - ${DATA_ROOT:-./data}/pageindex:/app/.run/pageindex
    environment:
      SPEECH_SERVICE_URL: http://host.docker.internal:8765

  frontend:
    image: ${NODE_IMAGE:-node:22-alpine}
    working_dir: /app
    volumes:
      - ./platform-frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm config set registry ${NPM_REGISTRY:-https://registry.npmmirror.com} && npm install --cache /tmp/npm-cache && npm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "${FRONTEND_PORT:-40005}:80"
    environment:
      # 勿用 .env 的 VITE_API_BASE=/ai（Vite 反代会挂）；开发固定直连本机 API 端口
      VITE_API_BASE: http://127.0.0.1:${STACK_DEV_API_PORT:-18000}
      VITE_BASE_PATH: ${VITE_BASE_PATH:-/ai/}
      VITE_DEV_API_TARGET: ${VITE_DEV_API_TARGET:-http://api:8000}

volumes:
  frontend_node_modules:
