# 网关模式 remote-dev：TCP 直连；HTTP 走 gateway :40005/deps/…

services:
  postgres:
    ports:
      - "${REMOTE_POSTGRES_PORT:-40002}:5432"

  redis:
    ports:
      - "${REMOTE_REDIS_PORT:-40003}:6379"

  minio:
    ports:
      - "${REMOTE_MINIO_PORT:-40004}:9000"

  knowflow-mysql:
    ports:
      - "${REMOTE_MYSQL_PORT:-40006}:3306"

  pdf2zh-api:
    ports: []

  speech-api:
    ports: []

  ragflow:
    ports: []

  knowflow-backend:
    ports: []
