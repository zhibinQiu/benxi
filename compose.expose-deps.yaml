# 远程依赖开发：暴露数据库/中间件端口（EXPOSE_DEPS=1 时由 stack.sh 自动叠加）
#
# 场景: 服务器跑依赖栈，本机跑 API+Vite（remote-dev 过渡方案）
# 用法:
#   cp .env.server.deps.example .env
#   EXPOSE_DEPS=1 bash scripts/stack.sh up --profile knowflow --profile speech \
#     postgres redis minio pdf2zh-api speech-api \
#     knowflow-mysql knowflow-infinity knowflow-gotenberg ragflow knowflow-backend
#
# 端口 40002–40009（40001 保留给同机 Dify）；变量见 .env.server.deps.example

services:
  postgres:
    ports:
      - "${REMOTE_POSTGRES_PORT:-40002}:5432"

  redis:
    ports:
      - "${REMOTE_REDIS_PORT:-40003}:6379"

  minio:
    ports:
      - "${REMOTE_MINIO_PORT:-40004}:9000"

  pdf2zh-api:
    ports:
      - "${REMOTE_PDF2ZH_PORT:-40005}:7861"

  speech-api:
    ports:
      - "${REMOTE_SPEECH_PORT:-40006}:8765"

  ragflow:
    ports:
      - "${REMOTE_RAGFLOW_PORT:-40007}:80"

  knowflow-backend:
    ports:
      - "${REMOTE_KNOWFLOW_BACKEND_PORT:-40008}:5000"

  knowflow-mysql:
    ports:
      - "${REMOTE_MYSQL_PORT:-40009}:3306"
