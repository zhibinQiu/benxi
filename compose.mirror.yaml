# 国内镜像加速覆盖（STACK_USE_MIRROR=1 时由 stack.sh 自动叠加）
#
# 覆盖 compose.yaml 中 postgres/redis/minio 等基础镜像及 build args。
# 若 1ms 限流/缺层: .env 设置 DOCKER_MIRROR=docker.m.daocloud.io

services:
  postgres:
    image: ${DOCKER_MIRROR:-docker.1ms.run}/library/postgres:16-alpine

  redis:
    image: ${DOCKER_MIRROR:-docker.1ms.run}/library/redis:7-alpine

  minio:
    image: ${DOCKER_MIRROR:-docker.1ms.run}/minio/minio:latest

  pdf2zh-api:
    build:
      args:
        BASE_IMAGE: ${DOCKER_MIRROR:-docker.1ms.run}/library/python:3.11-slim
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}

  api:
    build:
      args:
        PYTHON_IMAGE: ${DOCKER_MIRROR:-docker.1ms.run}/library/python:3.11-slim
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}

  worker:
    build:
      args:
        PYTHON_IMAGE: ${DOCKER_MIRROR:-docker.1ms.run}/library/python:3.11-slim
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}

  frontend:
    build:
      args:
        NODE_IMAGE: ${DOCKER_MIRROR:-docker.1ms.run}/library/node:22-alpine
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        ALPINE_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}

  speech-api:
    build:
      args:
        PYTHON_IMAGE: ${DOCKER_MIRROR:-docker.1ms.run}/library/python:3.11-slim
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
