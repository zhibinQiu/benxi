# 服务器部署覆盖：使用「Python 运行时镜像」+ 挂载后端源码
#
# 用法:
#   export SERVER_MOUNT_CODE=1
#   export REGISTRY_PREFIX=registry.cn-hangzhou.aliyuncs.com/your-namespace   # 可选，空则用本地 tag
#   bash scripts/stack.sh pull-registry    # 从 ACR 拉 runtime 镜像
#   bash scripts/stack.sh server-up        # 挂载 backend/app 启动 API
#
# 改 backend/app 后执行 ./dev.sh sync（默认重启 API / Worker，compose 变更时才 recreate）
#
# 连接池与 compose.yaml 对齐：单机生产档位 C（6 API worker × 12+8 + Celery 12 并发）

services:
  postgres:
    command: postgres -c max_connections=220 -c shared_buffers=512MB

  api:
    image: ${REGISTRY_IMAGE_PREFIX:-}zhitan-api-runtime:${ZHITAN_VERSION:-4.6.0}
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
        INSTALL_PAGEINDEX: ${INSTALL_PAGEINDEX:-1}
        INSTALL_BROWSER: ${INSTALL_BROWSER:-1}
    shm_size: "512mb"
    mem_limit: 4g
    ports:
      - "127.0.0.1:${STACK_DEV_API_PORT:-18000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/workers:/app/workers:ro
      - ./examples/agent-skills:/app/examples/agent-skills:ro
      - ./RELEASE.md:/app/RELEASE.md:ro
      - ${DATA_ROOT:-./data}/pageindex:/app/.run/pageindex
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 6
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      DB_POOL_SIZE: "12"
      DB_MAX_OVERFLOW: "8"
      DB_POOL_TIMEOUT: "15"
      STREAM_MAX_CONCURRENT_PER_WORKER: "12"
      STREAM_ACQUIRE_TIMEOUT: "5"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  worker:
    image: ${REGISTRY_IMAGE_PREFIX:-}zhitan-api-runtime:${ZHITAN_VERSION:-4.6.0}
    shm_size: "512mb"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/workers:/app/workers:ro
      - ${DATA_ROOT:-./data}/pageindex:/app/.run/pageindex
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=12
    environment:
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "5"

  frontend:
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/http.d/default.conf:ro
