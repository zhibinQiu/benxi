# 统一 HTTP 网关（GATEWAY_MODE=1，deps-only 栈）

server {
    listen 80;
    server_name _;
    client_max_body_size 200m;

    location = / {
        return 302 /deps/pdf2zh/docs;
    }

    location /deps/pdf2zh/ {
        rewrite ^/deps/pdf2zh/(.*)$ /$1 break;
        proxy_pass http://pdf2zh-api:7861;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location /deps/speech/ {
        rewrite ^/deps/speech/(.*)$ /$1 break;
        proxy_pass http://speech-api:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /deps/ragflow/ {
        rewrite ^/deps/ragflow/(.*)$ /$1 break;
        proxy_pass http://ragflow:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location /deps/knowflow/ {
        rewrite ^/deps/knowflow/(.*)$ /$1 break;
        proxy_pass http://knowflow-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
