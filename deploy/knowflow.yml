# KnowFlow / RAGFlow profile（由 stack.sh 与 compose.yaml 合并加载）
#
# 启动: bash scripts/stack.sh up --profile knowflow
# 共用栈内 minio、redis；默认不映射主机端口
# 向量库: Infinity（DOC_ENGINE=infinity，非 Elasticsearch）
# 配置: settings.yaml、infinity_conf.toml、theme/、nginx/
# 文档: docs/zh/operations/config-and-scripts.md

services:
  knowflow-mysql:
    profiles: ["knowflow"]
    image: mysql:8.0.39
    container_name: ragflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-infini_rag_flow}
      TZ: ${TIMEZONE:-Asia/Shanghai}
    command:
      - --max_connections=1000
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --tls_version=TLSv1.2,TLSv1.3
      - --init-file
      - /data/application/init.sql
      - --binlog_expire_logs_seconds=604800
    volumes:
      - ${DATA_ROOT:-./data}/knowflow-mysql:/var/lib/mysql
      - ./deploy/knowflow/init.sql:/data/application/init.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_PASSWORD:-infini_rag_flow}",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      zhitan:
        aliases:
          - mysql

  knowflow-infinity:
    profiles: ["knowflow"]
    image: ${INFINITY_IMAGE:-infiniflow/infinity:${INFINITY_VERSION:-v0.6.0-dev5}}
    container_name: ragflow-infinity
    restart: unless-stopped
    command: ["-f", "/infinity_conf.toml"]
    environment:
      TZ: ${TIMEZONE:-Asia/Shanghai}
    mem_limit: ${MEM_LIMIT:-8073741824}
    ulimits:
      nofile:
        soft: 500000
        hard: 500000
    volumes:
      - ${DATA_ROOT:-./data}/knowflow-infinity:/var/infinity
      - ./deploy/knowflow/infinity_conf.toml:/infinity_conf.toml:ro
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:23820/admin/node/current",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 45s
    networks:
      zhitan:
        aliases:
          - infinity

  knowflow-gotenberg:
    profiles: ["knowflow"]
    image: gotenberg/gotenberg:8
    container_name: knowflow-gotenberg
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE:-Asia/Shanghai}
    networks:
      - zhitan

  ragflow:
    profiles: ["knowflow"]
    platform: ${RAGFLOW_PLATFORM:-linux/arm64}
    image: ${RAGFLOW_IMAGE:-knowflow-ragflow:source}
    build:
      context: ./backend/third_party/KnowFlow
      dockerfile: Dockerfile
      args:
        LIGHTEN: ${KNOWFLOW_LIGHTEN:-1}
        NEED_MIRROR: ${KNOWFLOW_NEED_MIRROR:-1}
    container_name: ragflow-server
    restart: unless-stopped
    depends_on:
      knowflow-mysql:
        condition: service_healthy
      knowflow-infinity:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      TZ: ${TIMEZONE:-Asia/Shanghai}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      MACOS: ${MACOS:-0}
      LIGHTEN: ${KNOWFLOW_LIGHTEN:-1}
      DOC_ENGINE: ${DOC_ENGINE:-infinity}
      INFINITY_HOST: knowflow-infinity
      KNOWFLOW_API_URL: http://knowflow-backend:5000
      GOTENBERG_URL: http://knowflow-gotenberg:3000
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DB_HOST: knowflow-mysql
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ${DATA_ROOT:-./data}/knowflow-logs:/ragflow/logs
      - ./deploy/knowflow/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/knowflow/nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf:ro
      - ./deploy/knowflow/nginx/proxy.conf:/etc/nginx/proxy.conf:ro
      - ./deploy/knowflow/scripts/ragflow-healthcheck.sh:/usr/local/bin/ragflow-healthcheck.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/ragflow-healthcheck.sh"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s
    networks:
      - zhitan

  knowflow-backend:
    profiles: ["knowflow"]
    platform: ${KNOWFLOW_SERVER_PLATFORM:-linux/arm64}
    image: ${KNOWFLOW_SERVER_IMAGE:-knowflow-server:source}
    build:
      context: ./backend/third_party/KnowFlow/knowflow
      dockerfile: Dockerfile
      target: backend
      args:
        NEED_MIRROR: ${KNOWFLOW_NEED_MIRROR:-1}
    container_name: knowflow-backend
    restart: unless-stopped
    depends_on:
      knowflow-mysql:
        condition: service_healthy
      knowflow-gotenberg:
        condition: service_started
      ragflow:
        condition: service_started
    environment:
      FLASK_DEBUG: "false"
      RAGFLOW_BASE_URL: http://ragflow:9380
      DB_HOST: knowflow-mysql
      MYSQL_PORT: "3306"
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      DOC_ENGINE: ${DOC_ENGINE:-infinity}
      INFINITY_HOST: knowflow-infinity
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GOTENBERG_URL: http://knowflow-gotenberg:3000
      MANAGEMENT_ADMIN_USERNAME: ${MANAGEMENT_ADMIN_USERNAME:-admin}
      MANAGEMENT_ADMIN_PASSWORD: ${MANAGEMENT_ADMIN_PASSWORD:-12345678}
      MANAGEMENT_JWT_SECRET: ${MANAGEMENT_JWT_SECRET:-12345678}
      TZ: ${TIMEZONE:-Asia/Shanghai}
    volumes:
      - ./deploy/knowflow/settings.yaml:/app/services/config/settings.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zhitan
