server {
    listen 80;
    server_name _;
    root /ragflow/web/dist;
    resolver 127.0.0.11 ipv6=off valid=30s;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    location /api/knowflow/v1/ {
        set $kf_upstream knowflow-backend:5000;
        proxy_pass http://$kf_upstream/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        include /etc/nginx/proxy.conf;
    }

    location /api/v1/ {
        set $rf_upstream 127.0.0.1:9380;
        proxy_pass http://$rf_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        include /etc/nginx/proxy.conf;
    }

    location ~ ^/v1/ {
        set $rf_upstream 127.0.0.1:9380;
        proxy_pass http://$rf_upstream;
        include /etc/nginx/proxy.conf;
    }

    location /minio/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
        rewrite ^/minio/(.*)$ /$1 break;
    }

    location = /platform-branding.css {
        alias /ragflow/web/dist/platform-branding.css;
    }
    location = /platform-branding.js {
        alias /ragflow/web/dist/platform-branding.js;
    }

    location = /index.html {
        gzip off;
        root /ragflow/web/dist;
        sub_filter '</head>' '<link rel="stylesheet" href="/platform-branding.css"><script src="/platform-branding.js"></script></head>';
        sub_filter '</body>' '<script src="/platform-branding.js"></script></body>';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    location @spa_fallback {
        internal;
        gzip off;
        root /ragflow/web/dist;
        try_files /index.html =404;
        sub_filter '</head>' '<link rel="stylesheet" href="/platform-branding.css"><script src="/platform-branding.js"></script></head>';
        sub_filter '</body>' '<script src="/platform-branding.js"></script></body>';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    location / {
        index index.html;
        try_files $uri $uri/ @spa_fallback;
    }

    location ~ ^/static/(css|js|media)/ {
        expires 10y;
        access_log off;
    }
}
