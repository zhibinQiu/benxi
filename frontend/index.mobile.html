<!DOCTYPE html>
<html lang="zh-CN" data-color-scheme="blue">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>本析</title>
    <link rel="dns-prefetch" href="//api.example.com">
    <link rel="preconnect" href="//api.example.com" crossorigin>
    <style>
      html { scrollbar-gutter: stable; }
      #app { min-height: 100vh; }
      .app-skeleton {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--platform-bg, #f5f7fa);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .app-skeleton__spinner {
        width: 48px;
        height: 48px;
        border: 3px solid var(--platform-border, #e0e4e8);
        border-top-color: var(--platform-accent, #2080f0);
        border-radius: 50%;
        animation: sk-rotate 0.8s linear infinite;
      }
      .app-skeleton__label {
        margin-top: 16px;
        font-size: 14px;
        color: var(--platform-text-secondary, #888);
        letter-spacing: 0.02em;
      }
      @keyframes sk-rotate {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-skeleton" class="app-skeleton">
        <div class="app-skeleton__spinner"></div>
        <div class="app-skeleton__label">加载中...</div>
      </div>
    </div>
    <script type="module" src="/src/main.mobile.js"></script>
  </body>
</html>
