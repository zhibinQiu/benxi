worker_processes auto;
worker_rlimit_nofile 65535;

events {
    multi_accept on;
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── 日志 ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main buffer=32k;
    error_log  /var/log/nginx/error.log warn;

    # ─── 基础性能 ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens  off;

    # ─── Gzip 压缩（前端 JS/CSS 体积减少 60-80%）─────────
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               text/javascript image/svg+xml application/xml+rss;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "MSIE [1-6]\.";

    # ─── 静态资源缓存 ──────────────────────────────────────
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ─── 限流（API 防刷）───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Upstream 连接池 ───────────────────────────────────
    upstream api_backend {
        server api:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream pdf2zh_backend {
        server pdf2zh-api:7861 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    # ─── Server ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 200m;
        client_body_buffer_size 128k;

        # Docker 内置 DNS：避免容器启动顺序导致 upstream 解析失败
        resolver 127.0.0.11 valid=30s ipv6=off;

        # ── 静态资源 1y 强缓存 ──────────────────────────────
        location ^~ /ai/assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # pdf.worker 等 .mjs：默认 mime.types 无此扩展名
        location ~ ^/ai/(.+\.mjs)$ {
            alias /usr/share/nginx/html/$1;
            default_type application/javascript;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location = /ai/index.html {
            alias /usr/share/nginx/html/index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ── 平台 API ──────────────────────────────────────
        location /ai/api/ {
            client_max_body_size 200m;
            client_body_buffer_size 1m;
            proxy_request_buffering off;

            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # ── 兼容旧直连 /api（可选）─────────────────────────
        location /api/ {
            client_max_body_size 200m;
            proxy_request_buffering off;

            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # ── pdf2zh 翻译服务 ────────────────────────────────
        location /deps/pdf2zh/ {
            rewrite ^/deps/pdf2zh/(.*)$ /$1 break;
            proxy_pass http://pdf2zh_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # ── 语音服务（profile speech，可能未启动，用变量延迟解析）──
        location /deps/speech/ {
            set $upstream_speech http://speech-api:8765;
            rewrite ^/deps/speech/(.*)$ /$1 break;
            proxy_pass $upstream_speech;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── RAGFlow WebSocket + API（profile knowflow，可能未启动）──
        location /deps/ragflow/ {
            set $upstream_ragflow http://ragflow:80;
            rewrite ^/deps/ragflow/(.*)$ /$1 break;
            proxy_pass $upstream_ragflow;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # ── KnowFlow 后端（profile knowflow，可能未启动）───
        location /deps/knowflow/ {
            set $upstream_knowflow http://knowflow-backend:5000;
            rewrite ^/deps/knowflow/(.*)$ /$1 break;
            proxy_pass $upstream_knowflow;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── 设计系统（智能问数 / 双碳问答 / _next）────────
        location ~ ^/ai/(smart-data-query|retrieval|_next)(/|$) {
            limit_req zone=strict_limit burst=10 nodelay;

            proxy_pass http://127.0.0.1:40001;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:40001;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── SPA 路由 ──────────────────────────────────────
        location /ai/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ @ai_spa;
        }

        location @ai_spa {
            rewrite ^ /ai/index.html last;
        }

        location = / {
            return 302 /ai/;
        }
    }
}
