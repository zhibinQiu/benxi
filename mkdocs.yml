site_name: AI 办公系统
site_description: PDF 科学文献翻译与企业 AI 办公系统（中文文档）
repo_url: https://github.com/PDFMathTranslate-next/PDFMathTranslate-next
edit_uri: edit/main/docs/zh/

use_directory_urls: false
docs_dir: docs/zh

theme:
  name: material
  language: zh
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
  favicon: ../../icon/yezi.svg
  logo: ../../icon/yezi.svg

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 主页: index.md
  - 运维与部署:
    - 手册索引: operations/README.md
    - 组件与数据存储: operations/components-and-storage.md
    - 知识库数据一致性: operations/knowledge-data-consistency.md
    - 配置与脚本: operations/config-and-scripts.md
    - 系统架构: operations/architecture.md
    - Docker 容器: operations/docker-services.md
    - 网络拓扑: operations/network-topology.md
    - 部署指南: operations/deployment.md
    - 远程依赖开发: operations/server-deps.md
    - 单机迁移与热重载: operations/single-server-migration.md
    - 功能实现说明: operations/feature-implementation.md
    - 配置说明: operations/configuration.md
    - 数据库迁移: operations/database-migration.md
    - 权限与账户: operations/permissions.md
    - 测试: operations/testing.md
    - 升级: operations/upgrade.md
    - 安全: operations/security.md
    - 日常操作: operations/operations-manual.md
  - 开发实现说明书:
    - 说明书总览: development/implementation-manual.md
    - 第一篇 总览与架构:
      - 项目总体架构: development/system-architecture-overview.md
      - 平台架构索引: development/platform-architecture.md
