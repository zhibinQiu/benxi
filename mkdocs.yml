site_name: PDF 翻译与智碳平台AI系统
site_description: PDF 科学文献翻译与智碳平台AI系统（中文文档）
repo_url: https://github.com/PDFMathTranslate-next/PDFMathTranslate-next
edit_uri: edit/main/docs/zh/

use_directory_urls: false
docs_dir: docs/zh

theme:
  name: material
  language: zh
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
  favicon: ../../icon/yezi.svg
  logo: ../../icon/yezi.svg

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 主页: index.md
  - 快速开始: getting-started.md
  - 进阶:
    - 进阶选项: advanced/advanced.md
    - 语言代码: advanced/Language-Codes.md
    - 翻译服务: advanced/Documentation-of-Translation-Services.md
  - 开发:
    - 本地开发: development/local-development.md
    - amd64 部署: development/deploy-amd64.md
    - 智碳平台AI系统: development/doc-platform.md
    - 平台架构与运维: development/platform-architecture.md
    - REST API: development/rest-api.md
  - 平台设计:
    - 功能插件: platform/feature-plugins.md
    - 权限模型: platform/permission-model.md
    - 语音转写: platform/speech-models.md
    - 文档对比: platform/doc-compare-product-design.md
  - 支持语言: supported_languages.md
  - 常见问题: FAQ.md
