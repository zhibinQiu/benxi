[project]
name = "agentkit-interrupt"
version = "4.6.0"
description = "Interrupt/Checkpoint — Agent 执行中断、状态持久化与恢复（无 DB/LLM 依赖）"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["agent", "interrupt", "checkpoint", "hitl", "human-in-the-loop"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/your-org/agentkit"
Documentation = "https://github.com/your-org/agentkit#readme"
Source = "https://github.com/your-org/agentkit"
BugTracker = "https://github.com/your-org/agentkit/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_interrupt"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
