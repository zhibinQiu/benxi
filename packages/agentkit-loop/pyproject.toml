[project]
name = "agentkit-loop"
version = "4.6.0"
description = "Loop Engineering 核心 — 观测驱动的动态 Prompt 组装（非静态提示词工程）"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["agent", "loop-engineering", "prompt", "llm", "dynamic-prompt"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/zhibinQiu/Agentkit"
Documentation = "https://github.com/zhibinQiu/Agentkit#readme"
Source = "https://github.com/zhibinQiu/Agentkit"
BugTracker = "https://github.com/zhibinQiu/Agentkit/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_loop"]

[tool.pytest.ini_options]
testpaths = ["tests"]
