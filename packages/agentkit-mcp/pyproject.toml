[project]
name = "agentkit-mcp"
version = "4.6.0"
description = "轻量 MCP JSON-RPC 协议与 HTTP/SSE 客户端，零平台耦合"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["mcp", "json-rpc", "agent", "llm-tools", "protocol"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = ["httpx>=0.27.0"]

[project.urls]
Homepage = "https://github.com/your-org/agentkit"
Documentation = "https://github.com/your-org/agentkit#readme"
Source = "https://github.com/your-org/agentkit"
BugTracker = "https://github.com/your-org/agentkit/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
