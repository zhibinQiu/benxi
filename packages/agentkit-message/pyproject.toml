[project]
name = "agentkit-message"
version = "4.6.0"
description = "LLM 消息解析、内嵌工具调用提取、内容过滤 — Agent 消息层面通用处理"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["agent", "message", "llm", "tool-calls", "content-filter", "dsml"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/your-org/agentkit"
Documentation = "https://github.com/your-org/agentkit#readme"
Source = "https://github.com/your-org/agentkit"
BugTracker = "https://github.com/your-org/agentkit/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_message"]

[tool.pytest.ini_options]
testpaths = ["tests"]
