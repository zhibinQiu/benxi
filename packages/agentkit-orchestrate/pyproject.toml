[project]
name = "agentkit-orchestrate"
version = "4.6.0"
description = "多专精任务编排 — 任务模型、验收、协助与 workflow 事件（无 DB/LLM）"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["agent", "orchestrator", "multi-agent", "workflow", "orchestration"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "agentkit-aip @ file:../agentkit-aip",
]

[project.urls]
Homepage = "https://github.com/zhibinQiu/Agentkit"
Documentation = "https://github.com/zhibinQiu/Agentkit#readme"
Source = "https://github.com/zhibinQiu/Agentkit"
BugTracker = "https://github.com/zhibinQiu/Agentkit/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_orchestrate"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
