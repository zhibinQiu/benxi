[project]
name = "agentkit-route"
version = "4.6.0"
description = "多智能体路由类型与纯逻辑（无 DB / 无 LLM 依赖）"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["agent", "routing", "multi-agent", "orchestrator", "dispatch"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/zhibinQiu/Agentkit"
Documentation = "https://github.com/zhibinQiu/Agentkit#readme"
Source = "https://github.com/zhibinQiu/Agentkit"
BugTracker = "https://github.com/zhibinQiu/Agentkit/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_route"]

[tool.pytest.ini_options]
testpaths = ["tests"]
