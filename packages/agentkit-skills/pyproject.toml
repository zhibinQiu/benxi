[project]
name = "agentkit-skills"
version = "4.6.0"
description = "Agent Skill 插件框架：类型、注册表与统一 dispatch"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["agent", "skills", "tools", "plugin", "framework"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/zhibinQiu/Agentkit"
Documentation = "https://github.com/zhibinQiu/Agentkit#readme"
Source = "https://github.com/zhibinQiu/Agentkit"
BugTracker = "https://github.com/zhibinQiu/Agentkit/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_skills"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
