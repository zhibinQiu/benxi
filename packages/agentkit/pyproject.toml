[project]
name = "agentkit"
version = "4.6.0"
description = "AgentKit 元包 — 一次安装全部多智能体组件"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AgentKit Contributors" }]
keywords = ["agentkit", "multi-agent", "orchestration", "aip", "mcp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "agentkit-aip @ file:../agentkit-aip",
    "agentkit-loop @ file:../agentkit-loop",
    "agentkit-mcp @ file:../agentkit-mcp",
    "agentkit-message @ file:../agentkit-message",
    "agentkit-orchestrate @ file:../agentkit-orchestrate",
    "agentkit-route @ file:../agentkit-route",
    "agentkit-skills @ file:../agentkit-skills",
    "agentkit-subagent @ file:../agentkit-subagent",
    "agentkit-tools @ file:../agentkit-tools",
]

[project.urls]
Homepage = "https://github.com/zhibinQiu/Agentkit"
Documentation = "https://github.com/zhibinQiu/Agentkit#readme"
Source = "https://github.com/zhibinQiu/Agentkit"
BugTracker = "https://github.com/zhibinQiu/Agentkit/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit"]
