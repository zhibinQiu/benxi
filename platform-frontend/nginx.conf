server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200m;

    # pdf.worker 等 .mjs：默认 mime.types 无此扩展名，会落成 octet-stream 导致 ES module 加载失败
    location ~ ^/ai/(.+\.mjs)$ {
        alias /usr/share/nginx/html/$1;
        default_type application/javascript;
    }

    location = / {
        return 302 /ai/;
    }

    # 本机 remote-dev 共用依赖（与服务器生产 /ai/ 同端口 40005）
    location /deps/pdf2zh/ {
        rewrite ^/deps/pdf2zh/(.*)$ /$1 break;
        proxy_pass http://pdf2zh-api:7861;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location /deps/speech/ {
        rewrite ^/deps/speech/(.*)$ /$1 break;
        proxy_pass http://speech-api:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /deps/ragflow/ {
        rewrite ^/deps/ragflow/(.*)$ /$1 break;
        proxy_pass http://ragflow:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location /deps/knowflow/ {
        rewrite ^/deps/knowflow/(.*)$ /$1 break;
        proxy_pass http://knowflow-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # 平台 API：http://<IP>/ai/api/v1/... → 后端 /api/v1/...
    location /ai/api/ {
        client_max_body_size 200m;
        proxy_request_buffering off;
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # 设计系统内嵌（智能问数 / 双碳问答 / _next 静态资源）
    location ~ ^/ai/(smart-data-query|retrieval|_next)(/|$) {
        proxy_pass http://172.19.134.45:40001;
        proxy_http_version 1.1;
        proxy_set_header Host 172.19.134.45:40001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 智碳平台前端 SPA（Vite base=/ai/）
    location /ai/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # 兼容旧直连 /api（可选）
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
