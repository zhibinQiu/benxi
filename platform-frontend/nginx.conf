server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200m;

    location = / {
        return 302 /ai/;
    }

    # 平台 API：http://<IP>/ai/api/v1/... → 后端 /api/v1/...
    location /ai/api/ {
        client_max_body_size 200m;
        proxy_request_buffering off;
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # 设计系统内嵌（智能问数 / 双碳问答 / _next 静态资源）
    location ~ ^/ai/(smart-data-query|retrieval|_next)(/|$) {
        proxy_pass http://172.19.134.45:40001;
        proxy_http_version 1.1;
        proxy_set_header Host 172.19.134.45:40001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # KnowFlow 根路径静态资源（umi publicPath=/，含 lazy chunk 与 /static/）
    location ~ ^/(umi\.|static/|iconfont\.js|platform-branding\.(js|css)|logo\.svg|favicon\.svg|p__|[^/]+\.(async\.js|chunk\.css)) {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # KnowFlow SPA 根路由（iframe 内导航后 /knowledge、/search 等；须注入白标）
    location ~ ^/(knowledge|search|chunk|login|home|datasets|dataset|flow|chat|agents|agent-list|agent-templates|data-flows|next-chats|next-searches|profile-setting|user-setting|files|file)(/|$) {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # KnowFlow Web UI（注入 platform-branding，隐藏嵌入侧栏）
    location /ragflow-ui/ {
        proxy_pass http://api:8000/api/v1/embed-proxy/knowflow/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # KnowFlow / RAGFlow SPA 内 API 调用（/v1/*，与 /ragflow-ui 同源）
    location /v1/ {
        client_max_body_size 200m;
        proxy_request_buffering off;
        proxy_pass http://api:8000/api/v1/embed-proxy/knowflow/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /api/knowflow/ {
        proxy_pass http://api:8000/api/v1/embed-proxy/knowflow/api/knowflow/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # 智碳平台前端 SPA（Vite base=/ai/）
    location /ai/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # 兼容旧直连 /api（可选）
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
