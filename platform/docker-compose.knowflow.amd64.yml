# KnowFlow / RAGFlow — amd64 预构建镜像
# 编排逻辑与 docker-compose.knowflow.yml（Mac 本地）一致：
#   仅 include 基础设施，应用服务在本文件内显式定义（此处用预构建镜像，本地用源码 build）。
#
# 本地: bash scripts/zhitan.sh knowflow build && zhitan.sh knowflow
# 服务器: bash scripts/deploy.sh full

include:
  - path: ./third_party/KnowFlow/docker/docker-compose-base.yml
    env_file: ./knowflow.env

networks:
  ragflow:
    name: ${KNOWFLOW_DOCKER_NETWORK:-zhitanai_default}
    external: true

services:
  ragflow:
    platform: linux/amd64
    image: ${RAGFLOW_IMAGE:-zxwei/knowflow:v2.1.8}
    container_name: ragflow-server
    depends_on:
      mysql:
        condition: service_healthy
      es01:
        condition: service_healthy
    ports:
      # 与本地 knowflow.yml 一致：主机 9380 → 容器 nginx:80（Web UI）
      # 服务器 443 常被占用，不映射；Mac 本地见 docker-compose.knowflow.yml
      - ${SVR_HTTP_PORT:-9380}:80
    volumes:
      - ./third_party/KnowFlow/docker/ragflow-logs:/ragflow/logs
      - ./third_party/KnowFlow/docker/nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./third_party/KnowFlow/docker/nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./third_party/KnowFlow/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./third_party/KnowFlow/docker/entrypoint.sh:/ragflow/entrypoint.sh
      - ./knowflow-theme/platform-branding.css:/ragflow/web/dist/platform-branding.css:ro
      - ./knowflow-theme/platform-branding.js:/ragflow/web/dist/platform-branding.js:ro
      - ./knowflow-theme/logo.svg:/ragflow/web/dist/logo.svg:ro
      - ./knowflow-theme/favicon.svg:/ragflow/web/dist/favicon.svg:ro
      - ./knowflow-theme/patch-index-html.sh:/ragflow/patch-index-html.sh:ro
    entrypoint:
      - bash
      - -c
      - |
        sh /ragflow/patch-index-html.sh 2>/dev/null || true
        exec bash /ragflow/entrypoint.sh
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - MACOS=${MACOS:-0}
      - LIGHTEN=${KNOWFLOW_LIGHTEN:-1}
      - KNOWFLOW_API_URL=${KNOWFLOW_API_URL:-http://knowflow-backend:5000}
      - GOTENBERG_URL=http://knowflow-gotenberg:3000
    networks:
      - ragflow
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"

  knowflow-backend:
    platform: linux/amd64
    image: ${KNOWFLOW_SERVER_IMAGE:-zxwei/knowflow-server:v2.1.8}
    container_name: knowflow-backend
    ports:
      - "${KNOWFLOW_BACKEND_PORT:-5001}:5000"
    environment:
      - FLASK_DEBUG=false
      - RAGFLOW_BASE_URL=${RAGFLOW_BASE_URL:-http://ragflow-server:9380}
      - DB_HOST=${DB_HOST:-mysql}
      - MYSQL_PORT=3306
      - MINIO_HOST=${MINIO_HOST:-minio}
      - MINIO_PORT=9000
      - ES_HOST=${ES_HOST:-es01}
      - ES_PORT=9200
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=6379
      - GOTENBERG_URL=http://knowflow-gotenberg:3000
      - MANAGEMENT_ADMIN_USERNAME=${MANAGEMENT_ADMIN_USERNAME:-admin}
      - MANAGEMENT_ADMIN_PASSWORD=${MANAGEMENT_ADMIN_PASSWORD:-12345678}
      - MANAGEMENT_JWT_SECRET=${MANAGEMENT_JWT_SECRET:-12345678}
      - TZ=${TIMEZONE:-Asia/Shanghai}
    volumes:
      - ./third_party/KnowFlow/docker/knowflow-server/settings.yaml:/app/services/config/settings.yaml:ro
    networks:
      - ragflow
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      knowflow-gotenberg:
        condition: service_started
      ragflow:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  knowflow-gotenberg:
    platform: linux/amd64
    image: gotenberg/gotenberg:8
    container_name: knowflow-gotenberg
    ports:
      - "3000:3000"
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    networks:
      - ragflow
    restart: on-failure
