# KnowFlow 栈镜像走 docker.1ms.run（与 docker-compose.mirror.yml 一致）
# 用法: docker compose -f docker-compose.knowflow.amd64.yml -f docker-compose.knowflow.mirror.yml ...

services:
  es01:
    image: docker.1ms.run/library/elasticsearch:${STACK_VERSION:-8.11.3}
  mysql:
    image: docker.1ms.run/library/mysql:8.0.39
  minio:
    image: docker.1ms.run/minio/minio:RELEASE.2025-06-13T11-33-47Z
  redis:
    image: docker.1ms.run/valkey/valkey:8
  ragflow:
    image: docker.1ms.run/zxwei/knowflow:v2.1.8
  knowflow-backend:
    image: docker.1ms.run/zxwei/knowflow-server:v2.1.8
  knowflow-gotenberg:
    image: docker.1ms.run/gotenberg/gotenberg:8
