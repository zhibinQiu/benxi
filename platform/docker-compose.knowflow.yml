# KnowFlow / RAGFlow 栈（智碳平台AI系统）
# - 基础设施：third_party/KnowFlow/docker/docker-compose-base.yml
# - 应用服务：从源码构建（arm64），需先 bash scripts/zhitan.sh knowflow build
#
# 原官方预构建镜像编排（已停用，仅保留注释备查）：
# include:
#   - path: ./third_party/KnowFlow/docker/docker-compose-base.yml
#     env_file: ./knowflow.env
#   - path: ./third_party/KnowFlow/docker/docker-compose.yml
#     env_file: ./knowflow.env
# 其中 docker-compose.yml 使用:
#   ragflow.image: ${RAGFLOW_IMAGE}  # 如 zxwei/knowflow:v2.1.8（仅 linux/amd64）
#   knowflow-backend.image: zxwei/knowflow-server:v2.1.8

include:
  - path: ./third_party/KnowFlow/docker/docker-compose-base.yml
    env_file: ./knowflow.env

networks:
  ragflow:
    name: ${KNOWFLOW_DOCKER_NETWORK:-platform_default}
    external: true

services:
  # --- 源码构建：RAGFlow（替代上方预构建 ragflow 服务）---
  ragflow:
    platform: ${RAGFLOW_PLATFORM:-linux/arm64}
    build:
      context: ./third_party/KnowFlow
      dockerfile: Dockerfile
      args:
        LIGHTEN: ${KNOWFLOW_LIGHTEN:-1}
        NEED_MIRROR: ${KNOWFLOW_NEED_MIRROR:-1}
    image: ${RAGFLOW_IMAGE:-knowflow-ragflow:source}
    container_name: ragflow-server
    depends_on:
      mysql:
        condition: service_healthy
      es01:
        condition: service_healthy
    ports:
      # 主机 9380 → 容器 nginx:80（Web UI）；容器内 Python API 仍在 9380，供 nginx 反代
      - ${SVR_HTTP_PORT:-9380}:80
      - 443:443
    volumes:
      - ./third_party/KnowFlow/docker/ragflow-logs:/ragflow/logs
      - ./third_party/KnowFlow/docker/nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./third_party/KnowFlow/docker/nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./third_party/KnowFlow/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./third_party/KnowFlow/docker/entrypoint.sh:/ragflow/entrypoint.sh
      - ./knowflow-theme/platform-branding.css:/ragflow/web/dist/platform-branding.css:ro
      - ./knowflow-theme/platform-branding.js:/ragflow/web/dist/platform-branding.js:ro
      - ./knowflow-theme/logo.svg:/ragflow/web/dist/logo.svg:ro
      - ./knowflow-theme/favicon.svg:/ragflow/web/dist/favicon.svg:ro
      - ./knowflow-theme/patch-index-html.sh:/ragflow/patch-index-html.sh:ro
    entrypoint:
      - bash
      - -c
      - |
        sh /ragflow/patch-index-html.sh 2>/dev/null || true
        exec bash /ragflow/entrypoint.sh
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - MACOS=${MACOS:-1}
      - LIGHTEN=${KNOWFLOW_LIGHTEN:-1}
      - KNOWFLOW_API_URL=${KNOWFLOW_API_URL:-http://knowflow-backend:5000}
      - GOTENBERG_URL=http://knowflow-gotenberg:3000
    networks:
      - ragflow
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- 源码构建：KnowFlow Server（替代 zxwei/knowflow-server 预构建镜像）---
  knowflow-backend:
    platform: ${KNOWFLOW_SERVER_PLATFORM:-linux/arm64}
    build:
      context: ./third_party/KnowFlow/knowflow
      dockerfile: Dockerfile
      target: backend
      args:
        NEED_MIRROR: ${KNOWFLOW_NEED_MIRROR:-1}
    image: ${KNOWFLOW_SERVER_IMAGE:-knowflow-server:source}
    container_name: knowflow-backend
    ports:
      - "${KNOWFLOW_BACKEND_PORT:-5001}:5000"
    environment:
      - FLASK_DEBUG=false
      - RAGFLOW_BASE_URL=${RAGFLOW_BASE_URL:-http://ragflow-server:9380}
      - DB_HOST=${DB_HOST:-mysql}
      - MYSQL_PORT=3306
      - MINIO_HOST=${MINIO_HOST:-minio}
      - MINIO_PORT=9000
      - ES_HOST=${ES_HOST:-es01}
      - ES_PORT=9200
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=6379
      - GOTENBERG_URL=http://knowflow-gotenberg:3000
      - MANAGEMENT_ADMIN_USERNAME=${MANAGEMENT_ADMIN_USERNAME:-admin}
      - MANAGEMENT_ADMIN_PASSWORD=${MANAGEMENT_ADMIN_PASSWORD:-12345678}
      - MANAGEMENT_JWT_SECRET=${MANAGEMENT_JWT_SECRET:-12345678}
      - TZ=${TIMEZONE:-Asia/Shanghai}
    volumes:
      - ./third_party/KnowFlow/docker/knowflow-server/settings.yaml:/app/services/config/settings.yaml:ro
    networks:
      - ragflow
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      knowflow-gotenberg:
        condition: service_started
      ragflow:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  knowflow-gotenberg:
    platform: ${KNOWFLOW_PLATFORM:-linux/arm64}
    image: gotenberg/gotenberg:8
    container_name: knowflow-gotenberg
    ports:
      - "3000:3000"
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    networks:
      - ragflow
    restart: on-failure

