# 混合/本地开发覆盖：pdf2zh 与平台应用跑在宿主机，仅基础设施用 Docker。
# 用法: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d postgres redis minio

services:
  pdf2zh-api:
    profiles:
      - docker-full

  api:
    profiles:
      - docker-app
    environment:
      PDF2ZH_API_URL: http://host.docker.internal:7861
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    profiles:
      - docker-app
    environment:
      PDF2ZH_API_URL: http://host.docker.internal:7861
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    profiles:
      - docker-app
