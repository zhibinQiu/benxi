# 混合/本地开发覆盖：pdf2zh 与平台应用跑在宿主机，仅基础设施用 Docker。
# 用法: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d postgres redis minio

services:
  postgres:
    # 本地卷多为 pg16；amd64 部署栈仍用 docker-compose.yml 的 15
    image: postgres:16-alpine
    ports:
      - "5433:5432"

  pdf2zh-api:
    profiles:
      - docker-full

  api:
    profiles:
      - docker-app
    environment:
      PDF2ZH_API_URL: http://host.docker.internal:7861
      SPEECH_SERVICE_URL: http://host.docker.internal:8765
      KNOWFLOW_ENABLED: ${KNOWFLOW_ENABLED:-false}
      RAGFLOW_API_URL: http://ragflow-server:9380
      KNOWFLOW_BACKEND_URL: http://knowflow-backend:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    profiles:
      - docker-app
    environment:
      PDF2ZH_API_URL: http://host.docker.internal:7861
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    profiles:
      - docker-app
    ports:
      - "40005:40005"
