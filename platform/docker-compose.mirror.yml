# 内网/无法直连 Docker Hub 时使用（镜像走 docker.1ms.run）

services:
  postgres:
    image: docker.1ms.run/library/postgres:15-alpine
  redis:
    image: docker.1ms.run/library/redis:7-alpine
  minio:
    image: docker.1ms.run/minio/minio:latest
  pdf2zh-api:
    build:
      args:
        BASE_IMAGE: docker.1ms.run/library/python:3.11-slim
  api:
    build:
      args:
        PYTHON_IMAGE: docker.1ms.run/library/python:3.11-slim
  worker:
    build:
      args:
        PYTHON_IMAGE: docker.1ms.run/library/python:3.11-slim
  frontend:
    build:
      args:
        NODE_IMAGE: docker.1ms.run/library/node:22-alpine
        NGINX_IMAGE: docker.1ms.run/library/nginx:1.27-alpine
