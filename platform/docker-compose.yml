services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - platform_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - platform_minio:/data

  pdf2zh-api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["pdf2zh_next", "--api", "--api-port", "7861"]
    ports:
      - "7861:7861"
    volumes:
      - pdf2zh_config:/root/.config/pdf2zh
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7861/api/health')\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      PDF2ZH_API_URL: http://pdf2zh-api:7861
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      pdf2zh-api:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      PDF2ZH_API_URL: http://pdf2zh-api:7861
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: celery -A workers.celery_app worker --loglevel=info

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../platform-frontend:/app
      - platform_frontend_node_modules:/app/node_modules
    ports:
      - "5174:5174"
    command: sh -c "npm install --cache /tmp/npm-cache && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - api

volumes:
  platform_pg:
  platform_minio:
  pdf2zh_config:
  platform_frontend_node_modules:
