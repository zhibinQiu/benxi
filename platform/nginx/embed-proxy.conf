# 平台前端 Nginx：内嵌页反向代理（EMBED_PROXY_MODE=vite 时使用）
# 默认 EMBED_PROXY_MODE=api 经平台 API /api/v1/embed-proxy，仅需 Nginx 将 /api 反代到后端
# 用法：在 server {} 中 include 本文件，root 指向 platform-frontend/dist
#
# 注意：/ai/api/ 须优先于 /ai/（设计系统），否则平台 API 会被设计系统上游吞掉

# 智碳平台 API — http://<IP>/ai/api/v1/...
location /ai/api/ {
    proxy_pass http://127.0.0.1:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_buffering off;
}

# 设计系统 — 智能问数 / 双碳问答 / _next（勿用 location /ai/ 兜底，会与平台 SPA 冲突）
location ~ ^/ai/(smart-data-query|retrieval|_next)(/|$) {
    proxy_pass http://172.19.134.45:40001;
    proxy_http_version 1.1;
    proxy_set_header Host 172.19.134.45:40001;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# KnowFlow Web UI（HTML 注入 platform-branding.js）
location /ragflow-ui/ {
    proxy_pass http://127.0.0.1:8000/api/v1/embed-proxy/knowflow/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_buffering off;
}

# 平台 SPA 由 platform-frontend/nginx.conf 的 location /ai/ 提供

